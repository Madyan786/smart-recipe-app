name: smart_recipe_app
description: Smart Recipe App with Spoonacular API - Portfolio Project
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.1

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage (favorites)
  shared_preferences: ^2.2.3

  # Image caching
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.8

  # Shimmer loading effect
  shimmer: ^3.0.0

  # Animations
  flutter_animate: ^4.5.0

  # Google Fonts
  google_fonts: ^6.2.1

  # YouTube / URL opening
  url_launcher: ^6.3.0

  # Share recipe
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
