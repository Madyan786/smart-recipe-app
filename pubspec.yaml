name: smart_recipe_app
description: Smart Recipe App with Spoonacular API - Portfolio Project
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.2.1

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage (favorites)
  shared_preferences: ^2.2.3

  # Image caching
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.8

  # Shimmer loading effect
  shimmer: ^3.0.0

  # Animations
  flutter_animate: ^4.5.0

  # Google Fonts
  google_fonts: ^6.2.1

  # YouTube / URL opening
  url_launcher: ^6.3.0

  # Share recipe
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1B4332"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#1B4332"
  image: assets/icon/splash_logo.png
  color_dark: "#0F0F1A"
  image_dark: assets/icon/splash_logo.png
  android: true
  ios: true
  fullscreen: true
  android_12:
    color: "#1B4332"
    image: assets/icon/splash_logo.png
    color_dark: "#0F0F1A"
    image_dark: assets/icon/splash_logo.png
    icon_background_color: "#1B4332"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
